pipeline_name: "test"
project:
  name: "summercamp"
jenkins:
  default_node_names: "UE_5.5"
  workspace_suffix: "UE_5.5"
features:
  properties:
    items:
      - "buildDiscarder( logRotator( numToKeepStr: '10' ) )"
  github:
    credentials_id: "Emidee_Access_Token"
    pull_requests:
      filter:
        tokens:
          - "WIP"
          - "NO_CI"
        message: "This pull request is ignored because the token ${foundToken} was found in the title."
      update_description_from_pr_body: true
  slack_notifications:
    channel: "#p-summercamp-ci"
    message_template: " : ${env.JOB_NAME} - ${env.CHANGE_BRANCH} #${env.BUILD_NUMBER} (<${env.BUILD_URL}|Open>)"
  git:
    use_simple_checkout: true
    extensions:
      CheckoutOption:
        timeout: 120
      SubmoduleOption:
        disableSubmodules: false
        parentCredentials: true
        recursiveSubmodules: true
        reference: ""
        timeout: 120
        trackingSubmodules: false
      GitLFSPull:
        enabled: true
  unreal:
    project:
      uproject_path: "E:/Dev/Projects/Summercamp_pyscripts/SummerCamp.uproject"
    buildgraph:
      target: "BuildAndTest Summercamp"
      node_name_filters:
        "SummerCamp Editor Win64 Test=BootTest": "!Builder6-TR"
        "SummerCamp Win64 Development BootTest": "!Builder6-TR"
        "SummerCamp Editor Win64 Test=UE.EditorAutomation": "!Builder6-TR"
      properties:
        Skip_Test_EditorBoot: "True"
        Skip_Test_TargetBoot: "True"
        Skip_Validation_CompileAllBlueprints: "True"
        Skip_Validation_StaticAnalysis: "True"
      post_tasks:
        enabled: true
        archive_artifacts: true
    cleanup_after_build:
      enabled: true
      additional_node_name: "Win64"
